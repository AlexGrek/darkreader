apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  serviceName: {{ .Chart.Name }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
      - name: {{ .Chart.Name }}
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
        resources:
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
        env:
        - name: ENVIRONMENT
          value: {{ .Values.env.environment | quote }}
        - name: MASTER_PASSWORDS_FILE
          value: {{ .Values.env.masterPasswordsFile | quote }}
        - name: ADMIN_FILE_PATH
          value: {{ .Values.env.adminFilePath | quote }}
        - name: SESSION_FILE
          value: {{ .Values.env.sessionFile | quote }}
        - name: TEXT_PATH
          value: {{ .Values.env.textPath | quote }}
        volumeMounts:
        - name: darkreader-storage
          mountPath: {{ .Values.storage.mountPath }}
  volumeClaimTemplates:
  - metadata:
      name: darkreader-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- if .Values.storage.storageClass }}
      storageClassName: {{ .Values.storage.storageClass | quote }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.storage.size }}

---
# Headless service required by StatefulSet for stable pod DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-headless
spec:
  selector:
    app: {{ .Chart.Name }}
  clusterIP: None
  ports:
  - port: {{ .Values.service.targetPort }}
    targetPort: {{ .Values.service.targetPort }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
spec:
  selector:
    app: {{ .Chart.Name }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
  type: {{ .Values.service.type }}

---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: traefik
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Chart.Name }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
